<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FIRSTWAVE · 구독 취소</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --black: #0a0a0a;
      --white: #fafaf8;
      --gray-100: #f0efe9;
      --gray-300: #d4d2c9;
      --gray-500: #8a8880;
    }
    body {
      background: var(--white);
      color: var(--black);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    nav {
      padding: 24px 48px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--gray-300);
    }
    .nav-logo { display: flex; flex-direction: column; gap: 4px; text-decoration: none; }
    .nav-logo-name { font-family: 'DM Mono', monospace; font-size: 12px; font-weight: 500; letter-spacing: 0.12em; color: var(--black); }

    .content {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 48px 24px;
    }

    .box {
      max-width: 480px;
      width: 100%;
      text-align: center;
    }

    .icon {
      font-family: 'DM Mono', monospace;
      font-size: 40px;
      margin-bottom: 24px;
      display: block;
      opacity: 0.4;
    }

    .title {
      font-size: 26px;
      font-weight: 500;
      color: var(--black);
      letter-spacing: -0.02em;
      margin-bottom: 12px;
      line-height: 1.3;
    }

    .desc {
      font-size: 15px;
      color: var(--gray-500);
      line-height: 1.7;
      font-weight: 300;
      margin-bottom: 32px;
    }

    .email-badge {
      display: inline-block;
      font-family: 'DM Mono', monospace;
      font-size: 13px;
      color: var(--black);
      background: var(--gray-100);
      border: 1px solid var(--gray-300);
      border-radius: 6px;
      padding: 6px 14px;
      margin-bottom: 32px;
    }

    .btn-cancel {
      width: 100%;
      padding: 14px;
      font-size: 15px;
      font-weight: 500;
      font-family: 'DM Sans', sans-serif;
      color: var(--white);
      background: var(--black);
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: opacity 0.15s;
      margin-bottom: 12px;
    }
    .btn-cancel:hover { opacity: 0.75; }
    .btn-cancel:disabled { opacity: 0.4; cursor: not-allowed; }

    .btn-back {
      display: block;
      font-size: 13px;
      color: var(--gray-500);
      text-decoration: none;
      transition: color 0.15s;
    }
    .btn-back:hover { color: var(--black); }

    /* 성공/에러 상태 */
    .success-state, .error-state { display: none; }

    footer {
      padding: 20px 48px;
      border-top: 1px solid var(--gray-100);
      text-align: center;
    }
    .footer-text { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--gray-500); }
  </style>
</head>
<body>

  <nav>
    <a class="nav-logo" href="./index.html">
      <img src="https://raw.githubusercontent.com/hyukjin0419/news_letter/main/docs/assets/logo.svg" 
      width="130" height="44" alt="FIRSTWAVE" />
    </a>
  </nav>

  <div class="content">
    <div class="box">

      <!-- 기본 상태 -->
      <div id="defaultState">
        <span class="icon">〰</span>
        <h1 class="title">구독을 취소할게요</h1>
        <p class="desc">아래 이메일 주소의 구독을 취소해요.<br>언제든 다시 구독할 수 있어요.</p>
        <div class="email-badge" id="emailBadge">loading...</div>
        <button class="btn-cancel" id="cancelBtn" onclick="handleUnsubscribe()">구독 취소하기</button>
        <a class="btn-back" href="./subscribe.html">취소하지 않을게요 →</a>
      </div>

      <!-- 성공 상태 -->
      <div class="success-state" id="successState">
        <span class="icon" style="opacity:1;">✓</span>
        <h1 class="title">구독이 취소됐어요</h1>
        <p class="desc">그동안 함께해주셔서 감사해요.<br>언제든 다시 돌아오실 수 있어요.</p>
        <a class="btn-back" href="./subscribe.html" style="font-size:15px;color:var(--black);">다시 구독하기 →</a>
      </div>

      <!-- 에러 상태 -->
      <div class="error-state" id="errorState">
        <span class="icon">!</span>
        <h1 class="title">오류가 발생했어요</h1>
        <p class="desc" id="errorMsg">잠시 후 다시 시도해주세요.</p>
      </div>

    </div>
  </div>

  <footer>
    <span class="footer-text">FIRSTWAVE · 매일 오전 8시 발신</span>
  </footer>

  <script>
    // Google Apps Script URL (subscribe.html과 동일)
    const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxq8ElbmwtyJDHwcqvGGN4GdXO0VCAPl8ACoH-1r16OE7oEP18LFTxsVA7sh-Uml_9R/exec';

    // URL에서 이메일 파라미터 추출
    const params = new URLSearchParams(window.location.search);
    const email = params.get('email') || '';

    document.getElementById('emailBadge').textContent = email || '이메일 없음';

    if (!email) {
      document.getElementById('defaultState').style.display = 'none';
      document.getElementById('errorState').style.display = 'block';
      document.getElementById('errorMsg').textContent = '유효하지 않은 링크예요.';
    }

    async function handleUnsubscribe() {
      const btn = document.getElementById('cancelBtn');
      btn.disabled = true;
      btn.textContent = '처리 중...';

      try {
        const res = await fetch(APPS_SCRIPT_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'text/plain' },
          body: JSON.stringify({ action: 'unsubscribe', email }),
        });

        const result = await res.json();

        if (result.success) {
          document.getElementById('defaultState').style.display = 'none';
          document.getElementById('successState').style.display = 'block';
        } else if (result.message === 'NOT_FOUND') {
          btn.disabled = false;
          btn.textContent = '구독 취소하기';
          document.getElementById('errorState').style.display = 'block';
          document.getElementById('errorMsg').textContent = '등록된 이메일을 찾을 수 없어요.';
        } else {
          throw new Error(result.message);
        }

      } catch (err) {
        btn.disabled = false;
        btn.textContent = '구독 취소하기';
        alert('오류가 발생했어요. 잠시 후 다시 시도해주세요.');
      }
    }
  </script>

</body>
</html>
